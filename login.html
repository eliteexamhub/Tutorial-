

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Hub - Candidate Validation Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700;800&display=swap');
        
        :root { 
            --navy: #001f3f; 
            --green: #38761d; 
            --gold: #bc9c6a;
            --light-bg: #f8fafc; 
            --gradient: linear-gradient(135deg, #001f3f 0%, #38761d 100%); 
            --card-shadow: 0 20px 40px -15px rgba(0, 31, 63, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--light-bg); 
            min-height: 100vh; 
            color: var(--navy); 
            display: flex; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 480px;
        }

        header { 
            text-align: center; 
            padding: 30px; 
            background: var(--gradient); 
            color: white; 
            border-radius: 24px 24px 0 0; 
            box-shadow: 0 10px 25px rgba(0,31,63,0.1);
        }

        header h1 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            letter-spacing: 0.5px; 
        }

        header p { 
            margin-top: 6px; 
            font-size: 0.85rem;
            opacity: 0.85; 
            font-weight: 300; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .login-card { 
            background: white; 
            padding: 35px 30px; 
            border-radius: 0 0 24px 24px; 
            box-shadow: var(--card-shadow); 
            border: 1px solid rgba(0, 31, 63, 0.06); 
            border-top: none;
        }

        .instruction-text {
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group { 
            margin-bottom: 18px; 
        }

        .form-group label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 700; 
            margin-bottom: 6px; 
            color: var(--navy); 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            font-family: 'Poppins', sans-serif; 
            font-size: 0.9rem; 
            color: var(--navy);
            outline: none; 
            background-color: #f8fafc;
            transition: all 0.2s ease; 
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .form-group input:focus { 
            border-color: var(--green); 
            background-color: white;
            box-shadow: 0 0 0 3px rgba(56, 118, 29, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-validate { 
            width: 100%; 
            padding: 16px; 
            background: var(--navy); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 1rem; 
            cursor: pointer; 
            margin-top: 15px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease; 
        }

        .btn-validate:hover { 
            background: #002d5c; 
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0, 31, 63, 0.2);
        }

        .btn-validate:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        footer { 
            margin-top: 25px; 
            text-align: center; 
            font-size: 0.75rem; 
            color: #94a3b8; 
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <header>
        <h1>GATEKEEPER PORTAL</h1>
        <p>Verification Deck</p>
    </header>

    <div class="login-card">
        <p class="instruction-text">Please input your academic details below to validate your credentials and sync your profile data.</p>
        
        <form id="gatekeeper-form" onsubmit="validateAndRedirect(event)">
            <div class="form-group">
                <label for="student-name">Full Name</label>
                <input type="text" id="student-name" placeholder="Surname Firstname" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="student-email">Email Address</label>
                <input type="email" id="student-email" placeholder="name@domain.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="student-whatsapp">WhatsApp Number</label>
                <input type="tel" id="student-whatsapp" placeholder="e.g. 09032320783" required autocomplete="tel">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="student-faculty">Faculty</label>
                    <input type="text" id="student-faculty" placeholder="e.g. Science" required>
                </div>

                <div class="form-group">
                    <label for="student-dept">Department</label>
                    <input type="text" id="student-dept" placeholder="e.g. Mathematics" required>
                </div>
            </div>

            <button type="submit" class="btn-validate" id="submit-btn">Validate Profile</button>
        </form>
    </div>
</div>

<footer>
    &copy; 2026 Elite Hub Engine • Data Sync Protocol.
</footer>

<script>
// Live Google Web App Handler Route linked below
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWrBLmk8iX916KNyqkCmzTXVqYXqEcBtVN6xVic7jD9NyWkcbiWnPioRLoB06RiBd1SA/exec";

function validateAndRedirect(event) {
    event.preventDefault(); 
    
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.innerText = "Syncing Data...";

    // Gather text parameter values
    const name = document.getElementById('student-name').value.trim();
    const email = document.getElementById('student-email').value.trim();
    const whatsapp = document.getElementById('student-whatsapp').value.trim();
    const faculty = document.getElementById('student-faculty').value.trim();
    const department = document.getElementById('student-dept').value.trim();

    // 1. Pack and backup variables into native local browser profile cache
    const candidateData = { name, email, whatsapp, faculty, department };
    localStorage.setItem('verifiedCandidate', JSON.stringify(candidateData));

    // 2. Map structural parameters precisely to Google Sheet endpoint parameters
    const formData = new FormData();
    formData.append("Name", name);
    formData.append("Email", email);
    formData.append("WhatsApp", whatsapp);
    formData.append("Faculty", faculty);
    formData.append("Department", department);

    // 3. Fire asynchronous background transmission to Google Sheet
    fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        body: formData
    })
    .then(response => {
        alert("Profile Successfully Validated & Synced!");
        window.location.href = "index.html"; 
    })
    .catch(error => {
        console.error("Sync log trace error:", error.message);
        // Fallback: If network flags drop out, allow entrance since data is locally cached anyway
        alert("Profile validated successfully.");
        window.location.href = "index.html"; 
    });
}
</script>

</body>
</html>
