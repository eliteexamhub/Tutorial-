<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Exam Hub - Portal Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;800&display=swap');
        :root { 
            --navy: #001f3f; 
            --green: #38761d; 
            --light-bg: #f8fafc; 
            --gradient: linear-gradient(135deg, #001f3f 0%, #38761d 100%); 
            --card-shadow: 0 10px 25px -5px rgba(0, 31, 63, 0.05), 0 8px 10px -6px rgba(0, 31, 63, 0.05);
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--light-bg); margin: 0; padding: 20px; color: var(--navy); display: flex; flex-direction: column; min-height: 100vh; }
        
        #sync-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--green); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { max-width: 900px; margin: auto; flex: 1; width: 100%; box-sizing: border-box; }
        header { text-align: center; padding: 40px 20px; background: var(--gradient); color: white; border-radius: 24px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(0,31,63,0.15); }
        header h1 { margin: 0; font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; }
        header p { margin: 10px 0 0 0; opacity: 0.9; font-weight: 300; }
        
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; justify-content: center; }
        .subject-card { background: white; padding: 30px 20px; text-align: center; border-radius: 20px; font-weight: 800; box-shadow: var(--card-shadow); border: 1px solid rgba(0,31,63,0.06); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .subject-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 31, 63, 0.1); border-color: rgba(0,31,63,0.15); }
        .back-btn { display: block; background: #475569; color: white; padding: 16px; border-radius: 16px; text-decoration: none; text-align: center; margin-top: 25px; font-weight: 600; transition: background 0.2s; }
        .back-btn:hover { background: #334155; }
        
        .exam-layout { display: none; grid-template-columns: 1fr 280px; gap: 25px; max-width: 1150px; margin: auto; align-items: start; width: 100%; box-sizing: border-box; }
        .sidebar-wrapper { position: -webkit-sticky; position: sticky; top: 20px; z-index: 999; }

        @media (max-width: 900px) { 
            .exam-layout { grid-template-columns: 1fr; } 
            .sidebar-wrapper { position: -webkit-sticky; position: sticky; top: 10px; width: 100%; } 
        }

        #exam-main { background: white; padding: 30px; border-radius: 24px; box-shadow: var(--card-shadow); border: 1px solid rgba(0,31,63,0.05); }
        .timer-bar { position: -webkit-sticky; position: sticky; top: 20px; background: var(--green); color: white; padding: 14px; border-radius: 50px; text-align: center; font-weight: bold; z-index: 100; margin-bottom: 25px; box-shadow: 0 4px 12px rgba(56,118,29,0.3); font-size: 1.1rem; }
        
        .question-block { display: none; margin-bottom: 35px; padding-bottom: 25px; text-align: left; }
        .question-block.active { display: block; }
        
        .question-block p { font-size: 1.05rem; line-height: 1.6; margin-top: 0; }
        .options-group label { display: flex; align-items: center; background: #f8fafc; padding: 16px; margin: 12px 0; border-radius: 14px; cursor: pointer; border: 1px solid #e2e8f0; transition: all 0.2s ease; font-weight: 400; }
        .options-group label:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .options-group input[type="radio"] { margin-right: 12px; width: 18px; height: 18px; accent-color: var(--green); }
        
        .nav-controls { display: flex; gap: 15px; margin-top: 25px; margin-bottom: 15px; }
        .btn-nav { flex: 1; padding: 15px; background: #475569; color: white; border: none; border-radius: 14px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
        .btn-nav:hover { background: #334155; }
        .btn-nav:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
        
        .btn-action { width: 100%; padding: 18px; background: var(--navy); color: white; border: none; border-radius: 16px; font-weight: 700; font-size: 1.05rem; cursor: pointer; margin-top: 20px; transition: background 0.2s, transform 0.1s; }
        .btn-action:hover { background: #002d5c; }
        .btn-action:active { transform: scale(0.99); }
        
        .tracker-sidebar { background: white; padding: 24px; border-radius: 24px; box-shadow: var(--card-shadow); border: 1px solid rgba(0,31,63,0.1); max-height: calc(100vh - 80px); display: flex; flex-direction: column; }
        .tracker-title { font-weight: 800; font-size: 1rem; margin-bottom: 15px; text-align: center; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; letter-spacing: 0.5px; }
        .tracker-container { overflow-y: auto; padding-right: 4px; }
        .tracker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .tracker-dot { height: 40px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; color: #64748b; cursor: pointer; transition: all 0.2s ease; }
        .tracker-dot:hover { border-color: var(--navy); color: var(--navy); background: #e2e8f0; }
        .tracker-dot.current { border-color: var(--navy); color: var(--navy); background: #e2e8f0; box-shadow: 0 0 0 2px var(--navy); }

let activeExam = [];
let timeLeft = 1800; 
let timer;
const totalExamQuestions = 40; 
let currentQuestionIndex = 0;

function initLoader() {
    setTimeout(() => { document.getElementById('sync-loader').style.display = 'none'; }, 1200);
}

function shufflePool(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex != 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
}

function startExam(sub) {
    if (fullMthPool.length === 0) {
        alert("Please add questions into the database code matrix.");
        return;
    }
    
    let shuffledSelection = shufflePool([...fullMthPool]);
    activeExam = shuffledSelection.slice(0, Math.min(totalExamQuestions, fullMthPool.length));
    timeLeft = 1800; 
    
    currentQuestionIndex = 0; 
    document.getElementById('main-hub').style.display = 'none';
    document.getElementById('exam-container').style.display = 'grid'; 
    
    renderQuestions();
    buildStatusPanel();
    showQuestion(currentQuestionIndex); 
    startTimer();
}

function renderQuestions() {
    const list = document.getElementById('question-list');
    list.innerHTML = activeExam.map((item, idx) => `
        <div class="question-block" id="block-q${idx}">
            <p><strong>${idx + 1}. ${item.q}</strong></p>
            <div class="options-group">
                ${item.o.map((opt, i) => `
                    <label><input type="radio" name="q${idx}" value="${i}" onchange="updateTrackStatus(${idx})"> ${opt}</label>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function buildStatusPanel() {
    const panelGrid = document.getElementById('status-panel-grid');
    let dotsHTML = '';
    for(let i = 0; i < activeExam.length; i++) {
        dotsHTML += `<div class="tracker-dot" id="dot-q${i}" onclick="jumpToQuestion(${i})">${i + 1}</div>`;
    }
    panelGrid.innerHTML = dotsHTML;
}

function showQuestion(index) {
    const blocks = document.querySelectorAll('.question-block');
    blocks.forEach((block, idx) => {
        block.classList.toggle('active', idx === index);
    });

    const dots = document.querySelectorAll('.tracker-dot');
    dots.forEach((dot, idx) => {
        dot.classList.toggle('current', idx === index);
    });

    document.getElementById('prev-btn').disabled = (index === 0);
    document.getElementById('next-btn').disabled = (index === activeExam.length - 1);
}

function navigateQuestion(step) {
    currentQuestionIndex += step;
    showQuestion(currentQuestionIndex);
}

function jumpToQuestion(idx) {
    currentQuestionIndex = idx;
    showQuestion(currentQuestionIndex);
}

function updateTrackStatus(idx) {
    const targetDot = document.getElementById(`dot-q${idx}`);
    if (targetDot) targetDot.classList.add('answered');
}

function startTimer() {
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timer').innerText = `Time Remaining: ${m}:${s<10?'0':''}${s}`;
        if(timeLeft <= 0) submitExam();
    }, 1000);
}

function submitExam() {
    clearInterval(timer);
    let score = 0;
    let reviewHTML = `<h2>Performance Review</h2>`;

    activeExam.forEach((item, idx) => {
        const sel = document.querySelector(`input[name="q${idx}"]:checked`);
        const userVal = sel ? parseInt(sel.value) : null;
        const correct = userVal === item.a;
        if(correct) score++;

        reviewHTML += `
            <div class="question-block active" style="border-left: 5px solid ${correct ? '#38761d' : '#d32f2f'}; padding-left: 15px; text-align: left; margin-bottom: 35px; border-bottom: 1px solid #f1f5f9; padding-bottom: 25px;">
                <p><strong>${idx + 1}. ${item.q}</strong></p>
                <p style="color: ${correct ? '#38761d' : '#d32f2f'}; font-weight: 600;">You: ${userVal !== null ? item.o[userVal] : 'No Answer'}</p>
                ${!correct ? `<p style="color: #38761d; font-weight: bold;">Correct: ${item.o[item.a]}</p>` : ''}
            </div>`;
    });

    document.getElementById('exam-container').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('score-text').innerText = `${score} / ${activeExam.length}`;
    document.getElementById('review-area').innerHTML = reviewHTML;
    window.scrollTo(0,0);
}
</script>
</body>
</html>
