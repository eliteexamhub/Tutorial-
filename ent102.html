    { q: "What is the primary function of a business incubator?", o: ["Providing early-stage startups with workspace and support", "Collecting corporate tax revenues", "Regulating industrial product qualities", "Handling company liquidation processes"], a: 0 },
    { q: "The business practice of selling off old non-essential assets to quickly raise emergency liquid funds is:", o: ["Divestment", "Acquisition", "Merger", "Diversification"], a: 0 },
    { q: "What term describes an entrepreneur's capacity to continue driving a venture forward despite failures?", o: ["Resilience", "Risk aversion", "Complacency", "Indecisiveness"], a: 0 }
];

let activeExam = [];
let timeLeft = 1800; 
let timer;
const totalExamQuestions = 60; // Pulling out exactly 60 randomized questions
let currentQuestionIndex = 0;

function initLoader() {
    setTimeout(() => { document.getElementById('sync-loader').style.display = 'none'; }, 1200);
}

// Shuffling matrix to perfectly randomize the pool elements
function shufflePool(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex != 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
}

function startExam(sub) {
    if (sub === 'ENT102') {
        let shuffledSelection = shufflePool([...fullEntPool]);
        activeExam = shuffledSelection.slice(0, totalExamQuestions);
        timeLeft = 1800; 
    }
    
    currentQuestionIndex = 0; 
    document.getElementById('main-hub').style.display = 'none';
    document.getElementById('exam-container').style.display = 'grid'; 
    
    renderQuestions();
    buildStatusPanel();
    showQuestion(currentQuestionIndex); 
    startTimer();
}

function renderQuestions() {
    const list = document.getElementById('question-list');
    list.innerHTML = activeExam.map((item, idx) => `
        <div class="question-block" id="block-q${idx}">
            <p><strong>${idx + 1}. ${item.q}</strong></p>
            <div class="options-group">
                ${item.o.map((opt, i) => `
                    <label><input type="radio" name="q${idx}" value="${i}" onchange="updateTrackStatus(${idx})"> ${String.fromCharCode(65 + i)}. ${opt}</label>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function buildStatusPanel() {
    const panelGrid = document.getElementById('status-panel-grid');
    let dotsHTML = '';
    for(let i = 0; i < totalExamQuestions; i++) {
        dotsHTML += `<div class="tracker-dot" id="dot-q${i}" onclick="jumpToQuestion(${i})">${i + 1}</div>`;
    }
    panelGrid.innerHTML = dotsHTML;
}

function showQuestion(index) {
    const blocks = document.querySelectorAll('.question-block');
    blocks.forEach((block, idx) => {
        block.classList.toggle('active', idx === index);
    });

    const dots = document.querySelectorAll('.tracker-dot');
    dots.forEach((dot, idx) => {
        dot.classList.toggle('current', idx === index);
    });

    document.getElementById('prev-btn').disabled = (index === 0);
    document.getElementById('next-btn').disabled = (index === totalExamQuestions - 1);
}

function navigateQuestion(step) {
    currentQuestionIndex += step;
    showQuestion(currentQuestionIndex);
}

function jumpToQuestion(idx) {
    currentQuestionIndex = idx;
    showQuestion(currentQuestionIndex);
}

function updateTrackStatus(idx) {
    const targetDot = document.getElementById(`dot-q${idx}`);
    if (targetDot) targetDot.classList.add('answered');
}

function startTimer() {
    clearInterval(timer);
    timeLeft = 20 * 60; // Forces the exam duration to exactly 20 minutes
    timer = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timer').innerText = `Time Remaining: ${m}:${s<10?'0':''}${s}`;
        if(timeLeft <= 0) submitExam();
    }, 1000);
}


function submitExam() {
    clearInterval(timer);
    let score = 0;
    let reviewHTML = `<h2>Performance Review</h2>`;

    activeExam.forEach((item, idx) => {
        const sel = document.querySelector(`input[name="q${idx}"]:checked`);
        const userVal = sel ? parseInt(sel.value) : null;
        const correct = userVal === item.a;
        if(correct) score++;

        reviewHTML += `
            <div class="question-block active" style="border-left: 5px solid ${correct ? '#38761d' : '#d32f2f'}; padding-left: 15px; text-align: left; margin-bottom: 35px; border-bottom: 1px solid #f1f5f9; padding-bottom: 25px;">
                <p><strong>${idx + 1}. ${item.q}</strong></p>
                <p style="color: ${correct ? '#38761d' : '#d32f2f'}; font-weight: 600;">You: ${userVal !== null ? String.fromCharCode(65 + userVal) + '. ' + item.o[userVal] : 'No Answer'}</p>
                ${!correct ? `<p style="color: #38761d; font-weight: bold;">Correct: ${String.fromCharCode(65 + item.a)}. ${item.o[item.a]}</p>` : ''}
            </div>`;
    });

    // --- NEW GRADING SYSTEM ENGINE ---
    let percentage = Math.round((score / totalExamQuestions) * 100);
    let grade = "";
    let remark = "";
    let statusEmoji = "";

    if (percentage >= 70) {
        grade = "A";
        remark = "Excellent! You have mastered the art of ENT102, Come collect your award.";
        statusEmoji = "🔥🏆";
    } else if (percentage >= 60) {
        grade = "B";
        remark = "Very Good! Omo you na business man ooo 😅.";
        statusEmoji = "😎✨";
    } else if (percentage >= 50) {
        grade = "C";
        remark = "Good effort. Review some things.";
        statusEmoji = "👍📖";
    } else if (percentage >= 45) {
        grade = "D";
        remark = "Pass. You need to learn more.";
        statusEmoji = "⚠️📝";
    } else if (percentage >= 40) {
        grade = "E";
        remark = "Fair. but you still gats read bro .";
        statusEmoji = "👀⏳";
    } else {
        grade = "F";
        remark = "Omo, go and read your ENT oooo! 😂";
        statusEmoji = "💀❌";
    }

    // Hide exam layout and display upgraded result dashboard
    document.getElementById('exam-container').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    // Injecting the new metrics into the DOM
    document.getElementById('result-screen').innerHTML = `
        <div style="font-size: 4rem; margin-bottom: 10px;">${statusEmoji}</div>
        <h1 style="font-size: 3.5rem; margin: 0; color: var(--navy);">Grade: ${grade}</h1>
        <h2 style="font-weight: 600; margin: 10px 0; color: var(--green);">${percentage}% (${score} / ${totalExamQuestions} Correct)</h2>
        <p style="font-size: 1.1rem; max-width: 600px; margin: 0 auto 30px auto; color: #475569; font-weight: 400;">"${remark}"</p>
        <div id="review-area">${reviewHTML}</div>
        <button class="btn-action" onclick="location.reload()">Try Again</button>
    `;
    
    window.scrollTo(0,0);
}
</script>
</body>
</html>
