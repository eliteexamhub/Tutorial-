<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Exam Hub | Kelvin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        :root { --navy: #001f3f; --green: #38761d; --red: #cc0000; --light-bg: #f4f7f6; --gradient: linear-gradient(135deg, #001f3f 0%, #38761d 100%); }
        body { font-family: 'Poppins', sans-serif; background-color: var(--light-bg); margin: 0; padding: 20px; color: var(--navy); }

        /* Overlays */
        #welcome-overlay, #sync-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #sync-overlay { display: none; background: rgba(255, 255, 255, 0.98); }
        .sync-ring { width: 60px; height: 60px; border: 4px solid #f3f3f3; border-top: 4px solid var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* UI Elements */
        .container { max-width: 800px; margin: auto; }
        header { text-align: center; padding: 40px 20px; background: var(--gradient); color: white; border-radius: 25px; margin-bottom: 30px; }
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .subject-card { background: white; padding: 25px 10px; text-align: center; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .subject-card:hover { transform: translateY(-5px); }
        
        #exam-container, #result-screen { display: none; background: white; padding: 25px; border-radius: 20px; }
        .timer-bar { background: var(--green); color: white; padding: 12px; border-radius: 50px; text-align: center; font-weight: bold; position: sticky; top: 10px; margin-bottom: 20px; }
        .question-block { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .review-card { padding: 15px; margin-bottom: 10px; border-radius: 10px; background: #f9f9f9; border-left: 6px solid #ccc; }
        .correct { border-left-color: var(--green); }
        .wrong { border-left-color: var(--red); }
        .btn-action { width: 100%; padding: 18px; background: var(--navy); color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn-get-started { background: var(--gradient); color: white; border: none; padding: 18px 40px; font-size: 1.2rem; font-weight: 800; border-radius: 50px; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

<div id="welcome-overlay">
    <h1>Elite Exam Hub</h1>
    <p>Excellence through Practice</p>
    <button class="btn-get-started" onclick="document.getElementById('welcome-overlay').style.display='none'">PROCEED</button>
</div>

<div id="sync-overlay">
    <div class="sync-ring"></div>
    <div style="margin-top:20px; font-weight:600;" id="sync-msg">Establishing connection...</div>
</div>

<div class="container" id="main-hub">
    <header><h1>ELITE EXAM HUB</h1></header>
    <div class="subject-grid">
        <div class="subject-card" onclick="startExam('MTH102')">MTH102</div>
        <div class="subject-card" onclick="handleEntry('PHY102')">PHY102</div>
        <div class="subject-card" onclick="startExam('CHM102')">CHM102</div>
        <div class="subject-card" onclick="startExam('BIO102')">BIO102</div>
        <div class="subject-card" onclick="startExam('GST102')">GST102</div>
        <div class="subject-card" onclick="startExam('GST104')">GST104</div>
        <div class="subject-card" onclick="startExam('GST108')">GST108</div>
        <div class="subject-card" onclick="startExam('GST110')">GST110</div>
        <div class="subject-card" onclick="startExam('ENT102')">ENT102</div>
    </div>
</div>

<div class="container" id="exam-container">
    <div class="timer-bar" id="timer">00:00</div>
    <div id="question-list"></div>
    <button class="btn-action" onclick="submitExam()">SUBMIT ANSWERS</button>
</div>

<div class="container" id="result-screen">
    <h1 id="score-display" style="text-align:center;"></h1>
    <div id="detailed-review"></div>
    <button class="btn-action" onclick="location.reload()">RETURN TO HUB</button>
</div>

<script src="questions.js"></script>
<script src="questions2.js"></script>
<script src="questions3.js"></script>
<script src="questions4.js"></script>
<script src="questions5.js"></script>
<script src="questions6.js"></script>
<script src="questions7.js"></script>
<script src="questions8.js"></script>
<script src="questions9.js"></script>
<script src="questions10.js"></script>
<script src="questions11.js"></script>

<script>
    let activeQuestions = [];
    let timerInterval;

    function handleEntry(subject) {
        const sync = document.getElementById('sync-overlay');
        const msg = document.getElementById('sync-msg');
        sync.style.display = 'flex';
        const phases = ["Syncing question bank...", "Verifying PHY102 modules...", "Finalizing session..."];
        let i = 0;
        const step = setInterval(() => {
            if (i < phases.length) { msg.innerText = phases[i]; i++; }
            else { clearInterval(step); sync.style.display = 'none'; startExam(subject); }
        }, 700);
    }

    function startExam(subject) {
        document.getElementById('main-hub').style.display = 'none';
        document.getElementById('exam-container').style.display = 'block';
        let config = { count: 60, time: 1200 };
        if (['MTH102', 'PHY102', 'CHM102'].includes(subject)) config = { count: 40, time: 1800 };
        else if (subject === 'BIO102') config = { count: 80, time: 1800 };

        activeQuestions = examDatabase[subject].sort(() => 0.5 - Math.random()).slice(0, config.count);
        let time = config.time;
        renderExam();
        timerInterval = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = Math.floor(time/60) + ":" + (time%60 < 10 ? '0' : '') + (time%60);
            if(time <= 0) submitExam();
        }, 1000);
    }

    function renderExam() {
        const list = document.getElementById('question-list');
        list.innerHTML = activeQuestions.map((q, i) => `
            <div class="question-block">
                <p><strong>${i+1}. ${q.q}</strong></p>
                ${q.o.map((opt, oi) => `<label style="display:block; margin:5px 0; cursor:pointer;"><input type="radio" name="q${i}" value="${oi}"> ${opt}</label>`).join('')}
            </div>
        `).join('');
    }

    function submitExam() {
        clearInterval(timerInterval);
        let score = 0;
        let reviewHTML = "<h3>Question Review:</h3>";
        activeQuestions.forEach((q, i) => {
            const pick = document.querySelector(`input[name="q${i}"]:checked`);
            const selected = pick ? parseInt(pick.value) : null;
            const isCorrect = selected === q.a;
            if (isCorrect) score++;
            reviewHTML += `
                <div class="review-card ${isCorrect ? 'correct' : 'wrong'}">
                    <p><strong>${i+1}. ${q.q}</strong></p>
                    <p>Your answer: ${selected !== null ? q.o[selected] : 'Skipped'}</p>
                    ${!isCorrect ? `<p style="color:var(--green)">Correct: ${q.o[q.a]}</p>` : ''}
                </div>`;
        });
        document.getElementById('exam-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-display').innerText = `Score: ${score} / ${activeQuestions.length}`;
        document.getElementById('detailed-review').innerHTML = reviewHTML;
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
